<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#6C63FF">
  <title>Flashcards Hebraico</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+Hebrew:wght@400;700&family=Noto+Serif+Hebrew:wght@400;700&family=Frank+Ruhl+Libre:wght@400;700&family=David+Libre:wght@400;700&family=Heebo:wght@400;700&family=Rubik:wght@400;700&family=Alef:wght@400;700&family=Secular+One&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f0f0f5;
      --surface: #ffffff;
      --surface2: #f7f7fa;
      --text: #1a1a2e;
      --text2: #555;
      --accent: #6C63FF;
      --accent-light: #e8e6ff;
      --border: #e0e0e0;
      --card-shadow: 0 8px 32px rgba(108,99,255,0.12);
      --hl-bg: #ffe066;
      --hl-text: #1a1a2e;
      --radius: 16px;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    .dark {
      --bg: #0d0d1a;
      --surface: #1a1a2e;
      --surface2: #252540;
      --text: #e8e8f0;
      --text2: #aaa;
      --accent: #8b83ff;
      --accent-light: #2a2850;
      --border: #333;
      --card-shadow: 0 8px 32px rgba(0,0,0,0.4);
      --hl-bg: #3730a3;
      --hl-text: #fff;
    }

    html { height: 100%; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100%;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: calc(20px + var(--safe-top)) 16px calc(20px + var(--safe-bottom));
      transition: background 0.3s, color 0.3s;
      -webkit-tap-highlight-color: transparent;
      overscroll-behavior: none;
    }

    .app {
      width: 100%;
      max-width: 460px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .header h1 {
      font-size: 1.3rem;
      font-weight: 700;
      white-space: nowrap;
    }

    .header-actions {
      display: flex;
      gap: 6px;
      align-items: center;
    }

    /* Buttons */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      border-radius: 10px;
      padding: 8px 12px;
      font-size: 0.85rem;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.2s;
      min-height: 40px;
      user-select: none;
      -webkit-user-select: none;
    }

    .btn:hover { background: var(--accent-light); }
    .btn:active { transform: scale(0.96); }
    .btn-icon { padding: 8px; min-width: 40px; font-size: 1.1rem; }
    .btn-accent { background: var(--accent); color: white; border-color: var(--accent); }
    .btn-accent:hover { opacity: 0.9; background: var(--accent); }

    /* Select */
    .select-wrap {
      position: relative;
    }

    .select-wrap select {
      appearance: none;
      -webkit-appearance: none;
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 8px 32px 8px 12px;
      font-size: 0.85rem;
      font-family: inherit;
      cursor: pointer;
      min-height: 40px;
      width: 100%;
    }

    .select-wrap::after {
      content: '▾';
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      pointer-events: none;
      color: var(--text2);
      font-size: 0.8rem;
    }

    /* Toolbar */
    .toolbar {
      display: flex;
      gap: 6px;
      align-items: center;
      flex-wrap: wrap;
    }

    .toolbar .select-wrap { flex: 1; min-width: 140px; }

    /* Progress */
    .progress-bar {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .progress-track {
      flex: 1;
      height: 6px;
      background: var(--surface2);
      border-radius: 3px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 3px;
      transition: width 0.4s ease;
    }

    .progress-text {
      font-size: 0.8rem;
      color: var(--text2);
      font-weight: 600;
      white-space: nowrap;
      min-width: 50px;
      text-align: right;
    }

    /* Card */
    .card-container {
      perspective: 1200px;
      cursor: pointer;
      touch-action: pan-y;
    }

    .card-inner {
      position: relative;
      width: 100%;
      height: 220px;
      transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
      transform-style: preserve-3d;
    }

    .card-inner.flipped { transform: rotateY(180deg); }

    .card-face {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--card-shadow);
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      padding: 20px;
      overflow: hidden;
    }

    .card-front {
      direction: rtl;
    }

    .card-front .letter {
      font-family: 'Noto Sans Hebrew', serif;
      font-size: 72px;
      font-weight: 700;
      line-height: 1;
      color: var(--accent);
    }

    .card-front .letter-hint {
      font-size: 0.85rem;
      color: var(--text2);
      margin-top: 8px;
      direction: ltr;
    }

    .card-back {
      transform: rotateY(180deg);
      background: var(--accent-light);
      direction: ltr;
    }

    .card-back .letter-name {
      font-size: 2rem;
      font-weight: 700;
    }

    .card-back .letter-big {
      font-family: 'Noto Sans Hebrew', serif;
      font-size: 1.2rem;
      color: var(--text2);
      margin-top: 4px;
      direction: rtl;
    }

    /* Examples */
    .examples {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .examples-title {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text2);
      font-weight: 600;
    }

    .example-row {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 0.95rem;
      padding: 6px 0;
      border-bottom: 1px solid var(--surface2);
    }

    .example-row:last-child { border-bottom: none; }

    .example-word {
      font-family: 'Noto Sans Hebrew', serif;
      font-size: 1.3rem;
      direction: rtl;
      min-width: 70px;
      text-align: center;
      font-weight: 700;
    }

    .example-info {
      display: flex;
      flex-direction: column;
      gap: 1px;
    }

    .example-translit {
      font-size: 0.85rem;
      color: var(--text2);
      font-style: italic;
    }

    .example-meaning {
      font-weight: 500;
    }

    .hl {
      background: var(--hl-bg);
      color: var(--hl-text);
      padding: 1px 3px;
      border-radius: 4px;
    }

    /* Navigation */
    .nav {
      display: flex;
      gap: 10px;
      justify-content: center;
    }

    .nav .btn {
      flex: 1;
      max-width: 160px;
      min-height: 48px;
      font-size: 1rem;
      font-weight: 600;
    }

    /* Keyboard hint */
    .keyboard-hint {
      text-align: center;
      font-size: 0.75rem;
      color: var(--text2);
      opacity: 0.6;
    }

    @media (max-width: 500px) {
      .card-front .letter { font-size: 56px; }
      .card-inner { height: 190px; }
      .keyboard-hint { display: none; }
    }

    @media (min-width: 768px) {
      body { align-items: center; }
      .card-inner { height: 260px; }
      .card-front .letter { font-size: 90px; }
    }

    /* Install banner */
    .install-banner {
      display: none;
      background: var(--accent);
      color: white;
      border-radius: var(--radius);
      padding: 12px 16px;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      animation: fadeIn 0.3s ease;
    }

    .install-banner.show { display: flex; }

    .install-banner-text {
      flex: 1;
      font-size: 0.85rem;
      font-weight: 500;
    }

    .install-banner .btn {
      background: rgba(255,255,255,0.2);
      border: none;
      color: white;
      font-weight: 600;
      font-size: 0.8rem;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-8px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

<div class="app">
  <!-- Install Banner -->
  <div class="install-banner" id="installBanner">
    <div class="install-banner-text">Instale como app no seu dispositivo!</div>
    <button class="btn" onclick="installApp()">Instalar</button>
    <button class="btn btn-icon" onclick="dismissInstall()" style="padding:4px 8px">✕</button>
  </div>

  <!-- Header -->
  <div class="header">
    <h1>אלף־בית Flashcards</h1>
    <div class="header-actions">
      <button class="btn btn-icon" onclick="toggleDark()" id="darkBtn" title="Modo escuro">🌙</button>
    </div>
  </div>

  <!-- Toolbar -->
  <div class="toolbar">
    <div class="select-wrap">
      <select id="fontSelect" onchange="changeFont(this.value)">
        <optgroup label="Modernas (tela/apps)">
          <option value="'Noto Sans Hebrew', sans-serif">Noto Sans Hebrew</option>
          <option value="'Noto Serif Hebrew', serif">Noto Serif Hebrew</option>
          <option value="'Frank Ruhl Libre', serif">Frank Ruhl Libre</option>
          <option value="'David Libre', serif">David Libre</option>
          <option value="'Heebo', sans-serif">Heebo</option>
          <option value="'Rubik', sans-serif">Rubik</option>
          <option value="'Alef', sans-serif">Alef</option>
          <option value="'Secular One', sans-serif">Secular One</option>
        </optgroup>
        <optgroup label="Acadêmicas (niqud)">
          <option value="'SBL Hebrew', serif">SBL Hebrew</option>
          <option value="'Ezra SIL', serif">Ezra SIL</option>
          <option value="'Cardo', serif">Cardo</option>
        </optgroup>
      </select>
    </div>
  </div>

  <!-- Progress -->
  <div class="progress-bar">
    <div class="progress-track">
      <div class="progress-fill" id="progressFill"></div>
    </div>
    <div class="progress-text" id="progressText"></div>
  </div>

  <!-- Card -->
  <div class="card-container" id="cardContainer">
    <div class="card-inner" id="cardInner" onclick="onCardClick()">
      <div class="card-face card-front">
        <div class="letter" id="frontLetter"></div>
        <div class="letter-hint">Toque para revelar</div>
      </div>
      <div class="card-face card-back">
        <div class="letter-name" id="backName"></div>
        <div class="letter-big" id="backLetter"></div>
      </div>
    </div>
  </div>

  <!-- Examples -->
  <div class="examples" id="examples">
    <div class="examples-title">Exemplos</div>
  </div>

  <!-- Navigation -->
  <div class="nav">
    <button class="btn" onclick="prevCard()">← Anterior</button>
    <button class="btn btn-accent" onclick="nextCard()">Próximo →</button>
  </div>

  <div class="keyboard-hint">← → navegar &nbsp;|&nbsp; Espaço virar</div>
</div>

<script>
// ─── Data ───
const cards = [
  { front:"א", back:"Alef", examples:[{word:"אָדָם",translit:"Adam",meaning:"Homem"},{word:"אֵשׁ",translit:"Esh",meaning:"Fogo"},{word:"אֱמֶת",translit:"Emet",meaning:"Verdade"}]},
  { front:"ב", back:"Vet", examples:[{word:"לֵב",translit:"Lev",meaning:"Coração"},{word:"אָב",translit:"Av",meaning:"Pai"},{word:"טוֹב",translit:"Tov",meaning:"Bom"}]},
  { front:"בּ", back:"Bet", examples:[{word:"בֶּן",translit:"Ben",meaning:"Filho"},{word:"בַּיִת",translit:"Bayit",meaning:"Casa"},{word:"בּוֹרֵא",translit:"Bore",meaning:"Criador"}]},
  { front:"ג", back:"Gimel", examples:[{word:"גָּדוֹל",translit:"Gadol",meaning:"Grande"},{word:"גַּן",translit:"Gan",meaning:"Jardim"},{word:"גּוֹי",translit:"Goy",meaning:"Nação"}]},
  { front:"ד", back:"Dalet", examples:[{word:"דָּבָר",translit:"Davar",meaning:"Palavra"},{word:"יָד",translit:"Yad",meaning:"Mão"},{word:"דֶּרֶךְ",translit:"Derech",meaning:"Caminho"}]},
  { front:"ה", back:"He", examples:[{word:"הָאָרֶץ",translit:"Haaretz",meaning:"Terra"},{word:"הֵם",translit:"Hem",meaning:"Eles"},{word:"הוּא",translit:"Hu",meaning:"Ele"}]},
  { front:"ו", back:"Vav", examples:[{word:"וְ",translit:"Ve",meaning:"E"},{word:"מִצְוָה",translit:"Mitzvá",meaning:"Mandamento"},{word:"דָּוִד",translit:"David",meaning:"Davi"}]},
  { front:"ז", back:"Zayin", examples:[{word:"זָהָב",translit:"Zahav",meaning:"Ouro"},{word:"זֶה",translit:"Zeh",meaning:"Este"},{word:"זָכָר",translit:"Zachar",meaning:"Masculino"}]},
  { front:"ח", back:"Chet", examples:[{word:"חַיִּים",translit:"Chayim",meaning:"Vida"},{word:"חֶסֶד",translit:"Chesed",meaning:"Misericórdia"},{word:"רוּחַ",translit:"Ruach",meaning:"Espírito"}]},
  { front:"ט", back:"Tet", examples:[{word:"טוֹב",translit:"Tov",meaning:"Bom"},{word:"טָהוֹר",translit:"Tahor",meaning:"Puro"},{word:"מַטֶּה",translit:"Mateh",meaning:"Vara"}]},
  { front:"י", back:"Yod", examples:[{word:"יָד",translit:"Yad",meaning:"Mão"},{word:"יָם",translit:"Yam",meaning:"Mar"},{word:"יְהוָה",translit:"Adonai",meaning:"Senhor"}]},
  { front:"כ", back:"Khaf", examples:[{word:"בָּכָה",translit:"Bakhá",meaning:"Chorou"},{word:"אָכַל",translit:"Akhál",meaning:"Comeu"},{word:"שָׁכַב",translit:"Shakháv",meaning:"Deitou-se"}]},
  { front:"כּ", back:"Kaf", examples:[{word:"כָּל",translit:"Kol",meaning:"Tudo"},{word:"כִּי",translit:"Ki",meaning:"Porque"},{word:"כֹּהֵן",translit:"Kohen",meaning:"Sacerdote"}]},
  { front:"ך", back:"Kaf (Sofit)", examples:[{word:"מֶלֶךְ",translit:"Melech",meaning:"Rei"},{word:"דֶּרֶךְ",translit:"Derech",meaning:"Caminho"},{word:"בָּרוּךְ",translit:"Baruch",meaning:"Bendito"}]},
  { front:"ל", back:"Lamed", examples:[{word:"לֵב",translit:"Lev",meaning:"Coração"},{word:"לֹא",translit:"Lo",meaning:"Não"},{word:"לַיְלָה",translit:"Layla",meaning:"Noite"}]},
  { front:"מ", back:"Mem", examples:[{word:"מַיִם",translit:"Mayim",meaning:"Água"},{word:"מֶלֶךְ",translit:"Melech",meaning:"Rei"},{word:"מָקוֹם",translit:"Makom",meaning:"Lugar"}]},
  { front:"ם", back:"Mem (Sofit)", examples:[{word:"שָׁלוֹם",translit:"Shalom",meaning:"Paz"},{word:"יוֹם",translit:"Yom",meaning:"Dia"},{word:"שֵׁם",translit:"Shem",meaning:"Nome"}]},
  { front:"נ", back:"Nun", examples:[{word:"נָבִיא",translit:"Navi",meaning:"Profeta"},{word:"נֵר",translit:"Ner",meaning:"Lâmpada"},{word:"נָתַן",translit:"Natan",meaning:"Deu"}]},
  { front:"ן", back:"Nun (Sofit)", examples:[{word:"בֵּן",translit:"Ben",meaning:"Filho"},{word:"זָקֵן",translit:"Zaken",meaning:"Ancião"},{word:"כֹּהֵן",translit:"Kohen",meaning:"Sacerdote"}]},
  { front:"ס", back:"Samekh", examples:[{word:"סֵפֶר",translit:"Sefer",meaning:"Livro"},{word:"סוּס",translit:"Sus",meaning:"Cavalo"},{word:"חֶסֶד",translit:"Chesed",meaning:"Misericórdia"}]},
  { front:"ע", back:"Ayin", examples:[{word:"עַם",translit:"Am",meaning:"Povo"},{word:"עֵץ",translit:"Etz",meaning:"Árvore"},{word:"שָׁמַע",translit:"Shama",meaning:"Ouviu"}]},
  { front:"פ", back:"Fe", examples:[{word:"רָפָא",translit:"Rafá",meaning:"Curou"},{word:"נֶפֶשׁ",translit:"Néfesh",meaning:"Alma"},{word:"יָפֶה",translit:"Yafé",meaning:"Bonito"}]},
  { front:"פּ", back:"Pe", examples:[{word:"פֶּה",translit:"Peh",meaning:"Boca"},{word:"פֹּה",translit:"Po",meaning:"Aqui"},{word:"פָּעַל",translit:"Paal",meaning:"Fez"}]},
  { front:"ף", back:"Fe (Sofit)", examples:[{word:"אֶלֶף",translit:"Elef",meaning:"Mil"},{word:"סוֹף",translit:"Sof",meaning:"Fim"},{word:"כָּנָף",translit:"Kanaf",meaning:"Asa"}]},
  { front:"צ", back:"Tsadi", examples:[{word:"צַדִּיק",translit:"Tsadik",meaning:"Justo"},{word:"צֹאן",translit:"Tzon",meaning:"Rebanho"},{word:"מִצְוָה",translit:"Mitzvá",meaning:"Mandamento"}]},
  { front:"ץ", back:"Tsadi (Sofit)", examples:[{word:"אֶרֶץ",translit:"Eretz",meaning:"Terra"},{word:"קֵץ",translit:"Ketz",meaning:"Fim"},{word:"חֵץ",translit:"Chetz",meaning:"Flecha"}]},
  { front:"ק", back:"Qof", examples:[{word:"קוֹל",translit:"Kol",meaning:"Voz"},{word:"קָדוֹשׁ",translit:"Kadosh",meaning:"Santo"},{word:"מָקוֹם",translit:"Makom",meaning:"Lugar"}]},
  { front:"ר", back:"Resh", examples:[{word:"רֹאשׁ",translit:"Rosh",meaning:"Cabeça"},{word:"רוּחַ",translit:"Ruach",meaning:"Espírito"},{word:"אֶרֶץ",translit:"Eretz",meaning:"Terra"}]},
  { front:"ש", back:"Shin", examples:[{word:"שָׁלוֹם",translit:"Shalom",meaning:"Paz"},{word:"שֵׁם",translit:"Shem",meaning:"Nome"},{word:"שָׁמַיִם",translit:"Shamayim",meaning:"Céus"}]},
  { front:"ת", back:"Tav", examples:[{word:"שַׁבָּת",translit:"Shabát",meaning:"Sábado"},{word:"אֱמֶת",translit:"Emét",meaning:"Verdade"},{word:"בַּיִת",translit:"Báyit",meaning:"Casa"}]},
  { front:"תּ", back:"Tav (dagesh)", examples:[{word:"תּוֹרָה",translit:"Torah",meaning:"Lei"},{word:"תָּם",translit:"Tam",meaning:"Íntegro"},{word:"תֵּן",translit:"Ten",meaning:"Dá"}]}
];

// ─── State ───
let pos = 0;
let isFlipped = false;
let isAnimating = false;

// ─── Helpers ───
function stripNikud(str) {
  return str.normalize('NFD').replace(/[\u0591-\u05C7]/g, '');
}

function highlightLetter(word, letter) {
  const base = stripNikud(letter);
  // Agrupa cada letra hebraica com seus sinais combinantes (niqud, dagesh, etc.)
  const clusters = word.match(/([\u05D0-\u05EA][\u0591-\u05C7]*|.)/g) || [];
  return clusters.map(cluster =>
    stripNikud(cluster) === base ? `<span class="hl">${cluster}</span>` : cluster
  ).join('');
}

function savePrefs() {
  try {
    localStorage.setItem('heb_prefs', JSON.stringify({
      dark: document.body.classList.contains('dark'),
      font: document.getElementById('fontSelect').value
    }));
  } catch(e) {}
}

function loadPrefs() {
  try {
    const p = JSON.parse(localStorage.getItem('heb_prefs'));
    if (!p) return;
    if (p.dark) document.body.classList.add('dark');
    if (p.font) {
      document.getElementById('fontSelect').value = p.font;
      changeFont(p.font);
    }
  } catch(e) {}
}

function updateDarkBtn() {
  const isDark = document.body.classList.contains('dark');
  document.getElementById('darkBtn').textContent = isDark ? '☀️' : '🌙';
  document.querySelector('meta[name="theme-color"]').content = isDark ? '#0d0d1a' : '#6C63FF';
}

// ─── Card Logic ───
const cardInner = document.getElementById('cardInner');
const frontLetter = document.getElementById('frontLetter');
const backName = document.getElementById('backName');
const backLetter = document.getElementById('backLetter');
const progressFill = document.getElementById('progressFill');
const progressText = document.getElementById('progressText');
const examplesDiv = document.getElementById('examples');

function loadCard() {
  const c = cards[pos];
  const font = document.getElementById('fontSelect').value;
  frontLetter.textContent = c.front;
  frontLetter.style.fontFamily = font;
  backName.textContent = c.back;
  backLetter.textContent = c.front;
  backLetter.style.fontFamily = font;

  // Always reset to front side
  isFlipped = false;
  cardInner.classList.remove('flipped');

  // Progress
  const pct = ((pos + 1) / cards.length * 100).toFixed(0);
  progressFill.style.width = pct + '%';
  progressText.textContent = `${pos + 1} / ${cards.length}`;

  // Examples
  examplesDiv.innerHTML = '<div class="examples-title">Exemplos</div>' +
    c.examples.map(e =>
      `<div class="example-row">
        <div class="example-word">${highlightLetter(e.word, c.front)}</div>
        <div class="example-info">
          <span class="example-translit">${e.translit}</span>
          <span class="example-meaning">${e.meaning}</span>
        </div>
      </div>`
    ).join('');

  savePrefs();
}

function flipCard() {
  if (isAnimating) return;
  isFlipped = !isFlipped;
  if (isFlipped) {
    cardInner.classList.add('flipped');
  } else {
    cardInner.classList.remove('flipped');
  }
}

function nextCard() {
  if (isAnimating) return;
  isAnimating = true;
  cardInner.style.transition = 'transform 0.25s ease, opacity 0.25s ease';
  cardInner.style.transform = 'translateX(-100%) scale(0.95)';
  cardInner.style.opacity = '0';
  setTimeout(() => {
    pos = (pos + 1) % cards.length;
    loadCard();
    cardInner.style.transition = 'none';
    cardInner.style.transform = 'translateX(100%)';
    cardInner.style.opacity = '0';
    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        cardInner.style.transition = 'transform 0.25s ease, opacity 0.25s ease';
        cardInner.style.transform = '';
        cardInner.style.opacity = '';
        setTimeout(() => {
          cardInner.style.transition = '';
          cardInner.style.transform = '';
          cardInner.style.opacity = '';
          isAnimating = false;
        }, 260);
      });
    });
  }, 260);
}

function prevCard() {
  if (isAnimating) return;
  isAnimating = true;
  cardInner.style.transition = 'transform 0.25s ease, opacity 0.25s ease';
  cardInner.style.transform = 'translateX(100%) scale(0.95)';
  cardInner.style.opacity = '0';
  setTimeout(() => {
    pos = (pos - 1 + cards.length) % cards.length;
    loadCard();
    cardInner.style.transition = 'none';
    cardInner.style.transform = 'translateX(-100%)';
    cardInner.style.opacity = '0';
    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        cardInner.style.transition = 'transform 0.25s ease, opacity 0.25s ease';
        cardInner.style.transform = '';
        cardInner.style.opacity = '';
        setTimeout(() => {
          cardInner.style.transition = '';
          cardInner.style.transform = '';
          cardInner.style.opacity = '';
          isAnimating = false;
        }, 260);
      });
    });
  }, 260);
}

function changeFont(f) {
  frontLetter.style.fontFamily = f;
  backLetter.style.fontFamily = f;
  document.querySelectorAll('.example-word').forEach(el => el.style.fontFamily = f);
  savePrefs();
}

function toggleDark() {
  document.body.classList.toggle('dark');
  updateDarkBtn();
  savePrefs();
}

// ─── Touch / Swipe + Click ───
let touchStartX = 0;
let touchStartY = 0;
let touchWasSwiped = false;

const container = document.getElementById('cardContainer');

container.addEventListener('touchstart', e => {
  touchWasSwiped = false;
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
}, { passive: true });

container.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - touchStartX;
  const dy = e.changedTouches[0].clientY - touchStartY;

  if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 50) {
    touchWasSwiped = true;
    if (dx < 0) nextCard();
    else prevCard();
  }
  // Tap (no swipe) will be handled by onclick -> onCardClick
}, { passive: true });

function onCardClick() {
  if (touchWasSwiped) {
    touchWasSwiped = false;
    return;
  }
  flipCard();
}

// ─── Keyboard ───
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight') nextCard();
  else if (e.key === 'ArrowLeft') prevCard();
  else if (e.key === ' ') { e.preventDefault(); flipCard(); }
});

// ─── PWA Install ───
let deferredPrompt = null;

window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  document.getElementById('installBanner').classList.add('show');
});

function installApp() {
  if (deferredPrompt) {
    deferredPrompt.prompt();
    deferredPrompt.userChoice.then(() => {
      deferredPrompt = null;
      document.getElementById('installBanner').classList.remove('show');
    });
  }
}

function dismissInstall() {
  document.getElementById('installBanner').classList.remove('show');
}

// ─── Service Worker (inline, for offline) ───
if ('serviceWorker' in navigator) {
  const swCode = `
    const CACHE = 'heb-flash-v1';
    const URLS = [self.location.href];
    self.addEventListener('install', e => e.waitUntil(caches.open(CACHE).then(c => c.addAll(URLS))));
    self.addEventListener('fetch', e => e.respondWith(
      caches.match(e.request).then(r => r || fetch(e.request).then(resp => {
        const clone = resp.clone();
        caches.open(CACHE).then(c => c.put(e.request, clone));
        return resp;
      }))
    ));
  `;
  const blob = new Blob([swCode], { type: 'application/javascript' });
  navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(() => {});
}

// ─── Web App Manifest (inline) ───
const manifest = {
  name: 'Flashcards Hebraico',
  short_name: 'Hebraico',
  start_url: location.href,
  display: 'standalone',
  background_color: '#f0f0f5',
  theme_color: '#6C63FF',
  icons: [{
    src: 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><rect width="100" height="100" rx="20" fill="%236C63FF"/><text x="50" y="68" font-size="50" text-anchor="middle" fill="white" font-family="serif">א</text></svg>',
    sizes: '512x512',
    type: 'image/svg+xml'
  }]
};
const mBlob = new Blob([JSON.stringify(manifest)], { type: 'application/json' });
const mLink = document.createElement('link');
mLink.rel = 'manifest';
mLink.href = URL.createObjectURL(mBlob);
document.head.appendChild(mLink);

// ─── Init ───
loadPrefs();
loadCard();
updateDarkBtn();
</script>
