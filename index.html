<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#6C63FF">
  <title>Flashcards Hebraico</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+Hebrew:wght@400;700&family=Noto+Serif+Hebrew:wght@400;700&family=Frank+Ruhl+Libre:wght@400;700&family=David+Libre:wght@400;700&family=Heebo:wght@400;700&family=Rubik:wght@400;700&family=Alef:wght@400;700&family=Secular+One&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="app">
  <!-- Install Banner -->
  <div class="install-banner" id="installBanner">
    <div class="install-banner-text">Instale como app no seu dispositivo!</div>
    <button class="btn" onclick="installApp()">Instalar</button>
    <button class="btn btn-icon" onclick="dismissInstall()" style="padding:4px 8px">✕</button>
  </div>

  <!-- Header -->
  <div class="header">
    <h1>Flashcards</h1>
    <div class="header-actions">
      <button class="btn btn-icon" onclick="changeFontSize(-1)" title="Diminuir fonte">A-</button>
      <button class="btn btn-icon" onclick="changeFontSize(1)" title="Aumentar fonte">A+</button>
      <button class="btn btn-icon" onclick="toggleDark()" id="darkBtn" title="Modo escuro">🌙</button>
    </div>
  </div>

  <!-- Toolbar -->
  <div class="toolbar">
    <div class="select-wrap">
      <select id="deckSelect" onchange="changeDeck(this.value)">
        <option value="letters">Letras</option>
        <option value="vowels">Vogais</option>
      </select>
    </div>
    <div class="select-wrap">
      <select id="fontSelect" onchange="changeFont(this.value)">
        <optgroup label="Modernas (tela/apps)">
          <option value="'Noto Sans Hebrew', sans-serif">Noto Sans Hebrew</option>
          <option value="'Noto Serif Hebrew', serif">Noto Serif Hebrew</option>
          <option value="'Frank Ruhl Libre', serif">Frank Ruhl Libre</option>
          <option value="'David Libre', serif">David Libre</option>
          <option value="'Heebo', sans-serif">Heebo</option>
          <option value="'Rubik', sans-serif">Rubik</option>
          <option value="'Alef', sans-serif">Alef</option>
          <option value="'Secular One', sans-serif">Secular One</option>
        </optgroup>
        <optgroup label="Acadêmicas (niqud)">
          <option value="'SBL Hebrew', serif">SBL Hebrew</option>
          <option value="'Ezra SIL', serif">Ezra SIL</option>
          <option value="'Cardo', serif">Cardo</option>
        </optgroup>
      </select>
    </div>
  </div>

  <!-- Progress -->
  <div class="progress-bar">
    <div class="progress-track">
      <div class="progress-fill" id="progressFill"></div>
    </div>
    <div class="progress-text" id="progressText"></div>
  </div>

  <!-- Card -->
  <div class="card-container" id="cardContainer">
    <div class="card-inner" id="cardInner" onclick="onCardClick()">
      <div class="card-face card-front">
        <div class="letter" id="frontLetter"></div>
        <div class="letter-hint">Toque para revelar</div>
        <button class="btn-audio card-audio" onclick="event.stopPropagation(); speakHebrew(cards[pos].front)" title="Ouvir letra">&#x1F50A;</button>
      </div>
      <div class="card-face card-back">
        <div class="letter-name" id="backName"></div>
        <div class="letter-big" id="backLetter"></div>
        <button class="btn-audio card-audio" onclick="event.stopPropagation(); speakHebrew(cards[pos].front)" title="Ouvir letra">&#x1F50A;</button>
      </div>
    </div>
  </div>

  <!-- Examples -->
  <div class="examples" id="examples">
    <div class="examples-title">Exemplos</div>
  </div>

  <!-- Navigation -->
  <div class="nav">
    <button class="btn" onclick="prevCard()">← Anterior</button>
    <button class="btn" onclick="nextCard()">Próximo →</button>
  </div>

  <div class="keyboard-hint">← → navegar &nbsp;|&nbsp; Espaço virar</div>
</div>

<script src="cards.js"></script>
<script>
// ─── State ───
let cards = letterCards;
let pos = 0;
let isFlipped = false;
let isAnimating = false;

// ─── Helpers ───
function stripNikud(str) {
  return str.normalize('NFD').replace(/[\u0591-\u05C7]/g, '');
}

function highlightLetter(word, letter) {
  const base = stripNikud(letter);
  const clusters = word.match(/([\u05D0-\u05EA][\u0591-\u05C7]*|.)/g) || [];
  return clusters.map(cluster =>
    stripNikud(cluster) === base ? `<span class="hl">${cluster}</span>` : cluster
  ).join('');
}

let currentAudio = null;
function speakHebrew(text) {
  // Cancela áudio anterior
  speechSynthesis.cancel();
  if (currentAudio) {
    currentAudio.pause();
    currentAudio = null;
  }

  // Tenta Web Speech API primeiro (funciona em mobile e sistemas com voz hebraica)
  const voices = speechSynthesis.getVoices();
  const heVoice = voices.find(v => v.lang.startsWith('he'));
  if (heVoice) {
    const u = new SpeechSynthesisUtterance(text);
    u.voice = heVoice;
    u.lang = 'he-IL';
    u.rate = 0.85;
    speechSynthesis.speak(u);
    return;
  }

  // Fallback: Google Translate TTS
  const audio = new Audio(
    'https://translate.google.com/translate_tts?ie=UTF-8&client=tw-ob&tl=he&q=' +
    encodeURIComponent(text)
  );
  currentAudio = audio;
  audio.play().catch(() => {});
  audio.onended = () => { currentAudio = null; };
}

// Pré-carrega lista de vozes (alguns navegadores carregam de forma assíncrona)
speechSynthesis.getVoices();
speechSynthesis.onvoiceschanged = () => { speechSynthesis.getVoices(); };

function highlightVowel(word, front) {
  const clusters = word.match(/([\u05D0-\u05EA][\u0591-\u05C7]*|.)/g) || [];
  const isVavVowel = front.length > 2 && front.includes('ו');

  if (isVavVowel) {
    // Cholam Malei (וֹ) ou Shuruk (וּ)
    const vavMark = front.match(/[\u0591-\u05C7]/)?.[0];
    return clusters.map(cluster => {
      const base = stripNikud(cluster);
      const marks = cluster.match(/[\u0591-\u05C7]/g) || [];
      return (base === 'ו' && marks.includes(vavMark))
        ? `<span class="hl">${cluster}</span>` : cluster;
    }).join('');
  }

  const vowelMark = front.match(/[\u0591-\u05C7]/)?.[0];
  if (!vowelMark) return word;
  return clusters.map(cluster => {
    const marks = cluster.match(/[\u0591-\u05C7]/g) || [];
    return marks.includes(vowelMark)
      ? `<span class="hl">${cluster}</span>` : cluster;
  }).join('');
}

function savePrefs() {
  try {
    localStorage.setItem('heb_prefs', JSON.stringify({
      dark: document.body.classList.contains('dark'),
      font: document.getElementById('fontSelect').value
    }));
  } catch(e) {}
}

function loadPrefs() {
  try {
    const p = JSON.parse(localStorage.getItem('heb_prefs'));
    if (!p) return;
    if (p.dark) document.body.classList.add('dark');
    if (p.font) {
      document.getElementById('fontSelect').value = p.font;
      changeFont(p.font);
    }
  } catch(e) {}
}

function updateDarkBtn() {
  const isDark = document.body.classList.contains('dark');
  document.getElementById('darkBtn').textContent = isDark ? '☀️' : '🌙';
  document.querySelector('meta[name="theme-color"]').content = isDark ? '#0d0d1a' : '#6C63FF';
}

// ─── Card Logic ───
const cardInner = document.getElementById('cardInner');
const frontLetter = document.getElementById('frontLetter');
const backName = document.getElementById('backName');
const backLetter = document.getElementById('backLetter');
const progressFill = document.getElementById('progressFill');
const progressText = document.getElementById('progressText');
const examplesDiv = document.getElementById('examples');

function loadCard() {
  const c = cards[pos];
  const font = document.getElementById('fontSelect').value;
  frontLetter.textContent = c.front;
  frontLetter.style.fontFamily = font;
  backName.textContent = c.back;
  backLetter.textContent = c.front;
  backLetter.style.fontFamily = font;

  // Always reset to front side
  isFlipped = false;
  cardInner.classList.remove('flipped');

  // Progress
  const pct = ((pos + 1) / cards.length * 100).toFixed(0);
  progressFill.style.width = pct + '%';
  progressText.textContent = `${pos + 1} / ${cards.length}`;

  // Examples
  examplesDiv.innerHTML = '<div class="examples-title">Exemplos</div>' +
    c.examples.map(e =>
      `<div class="example-row">
        <div class="example-word">${(cards === vowelCards ? highlightVowel : highlightLetter)(e.word, c.front)}</div>
        <div class="example-info">
          <span class="example-translit">${e.translit}</span>
          <span class="example-meaning">${e.meaning}</span>
        </div>
        <button class="btn-audio" onclick="speakHebrew('${e.word}')" title="Ouvir palavra">&#x1F50A;</button>
      </div>`
    ).join('');

  savePrefs();
}

function flipCard() {
  if (isAnimating) return;
  isFlipped = !isFlipped;
  if (isFlipped) {
    cardInner.classList.add('flipped');
  } else {
    cardInner.classList.remove('flipped');
  }
}

function nextCard() {
  if (isAnimating) return;
  isAnimating = true;
  cardInner.style.transition = 'transform 0.25s ease, opacity 0.25s ease';
  cardInner.style.transform = 'translateX(-100%) scale(0.95)';
  cardInner.style.opacity = '0';
  setTimeout(() => {
    pos = (pos + 1) % cards.length;
    loadCard();
    cardInner.style.transition = 'none';
    cardInner.style.transform = 'translateX(100%)';
    cardInner.style.opacity = '0';
    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        cardInner.style.transition = 'transform 0.25s ease, opacity 0.25s ease';
        cardInner.style.transform = '';
        cardInner.style.opacity = '';
        setTimeout(() => {
          cardInner.style.transition = '';
          cardInner.style.transform = '';
          cardInner.style.opacity = '';
          isAnimating = false;
        }, 260);
      });
    });
  }, 260);
}

function prevCard() {
  if (isAnimating) return;
  isAnimating = true;
  cardInner.style.transition = 'transform 0.25s ease, opacity 0.25s ease';
  cardInner.style.transform = 'translateX(100%) scale(0.95)';
  cardInner.style.opacity = '0';
  setTimeout(() => {
    pos = (pos - 1 + cards.length) % cards.length;
    loadCard();
    cardInner.style.transition = 'none';
    cardInner.style.transform = 'translateX(-100%)';
    cardInner.style.opacity = '0';
    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        cardInner.style.transition = 'transform 0.25s ease, opacity 0.25s ease';
        cardInner.style.transform = '';
        cardInner.style.opacity = '';
        setTimeout(() => {
          cardInner.style.transition = '';
          cardInner.style.transform = '';
          cardInner.style.opacity = '';
          isAnimating = false;
        }, 260);
      });
    });
  }, 260);
}

function changeDeck(deck) {
  cards = deck === 'vowels' ? vowelCards : letterCards;
  pos = 0;
  loadCard();
}

function changeFont(f) {
  frontLetter.style.fontFamily = f;
  backLetter.style.fontFamily = f;
  document.querySelectorAll('.example-word').forEach(el => el.style.fontFamily = f);
  savePrefs();
}

let fontScale = 0;
function changeFontSize(delta) {
  fontScale = Math.max(-3, Math.min(5, fontScale + delta));
  const scale = 1 + fontScale * 0.15;
  frontLetter.style.transform = `scale(${scale})`;
  backName.style.transform = `scale(${scale})`;
  backLetter.style.transform = `scale(${scale})`;
  document.querySelectorAll('.example-word').forEach(el => el.style.transform = `scale(${scale})`);
}

function toggleDark() {
  document.body.classList.toggle('dark');
  updateDarkBtn();
  savePrefs();
}

// ─── Touch / Swipe + Click ───
let touchStartX = 0;
let touchStartY = 0;
let touchWasSwiped = false;

const container = document.getElementById('cardContainer');

container.addEventListener('touchstart', e => {
  touchWasSwiped = false;
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
}, { passive: true });

container.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - touchStartX;
  const dy = e.changedTouches[0].clientY - touchStartY;

  if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 50) {
    touchWasSwiped = true;
    if (dx < 0) nextCard();
    else prevCard();
  }
  // Tap (no swipe) will be handled by onclick -> onCardClick
}, { passive: true });

function onCardClick() {
  if (touchWasSwiped) {
    touchWasSwiped = false;
    return;
  }
  flipCard();
}

// ─── Keyboard ───
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight') nextCard();
  else if (e.key === 'ArrowLeft') prevCard();
  else if (e.key === ' ') { e.preventDefault(); flipCard(); }
});

// ─── PWA Install ───
let deferredPrompt = null;

window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  document.getElementById('installBanner').classList.add('show');
});

function installApp() {
  if (deferredPrompt) {
    deferredPrompt.prompt();
    deferredPrompt.userChoice.then(() => {
      deferredPrompt = null;
      document.getElementById('installBanner').classList.remove('show');
    });
  }
}

function dismissInstall() {
  document.getElementById('installBanner').classList.remove('show');
}

// ─── Service Worker (inline, for offline) ───
if ('serviceWorker' in navigator) {
  const swCode = `
    const CACHE = 'heb-flash-v1';
    const URLS = [self.location.href];
    self.addEventListener('install', e => e.waitUntil(caches.open(CACHE).then(c => c.addAll(URLS))));
    self.addEventListener('fetch', e => e.respondWith(
      caches.match(e.request).then(r => r || fetch(e.request).then(resp => {
        const clone = resp.clone();
        caches.open(CACHE).then(c => c.put(e.request, clone));
        return resp;
      }))
    ));
  `;
  const blob = new Blob([swCode], { type: 'application/javascript' });
  navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(() => {});
}

// ─── Web App Manifest (inline) ───
const manifest = {
  name: 'Flashcards Hebraico',
  short_name: 'Hebraico',
  start_url: location.href,
  display: 'standalone',
  background_color: '#f0f0f5',
  theme_color: '#6C63FF',
  icons: [{
    src: 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><rect width="100" height="100" rx="20" fill="%236C63FF"/><text x="50" y="68" font-size="50" text-anchor="middle" fill="white" font-family="serif">א</text></svg>',
    sizes: '512x512',
    type: 'image/svg+xml'
  }]
};
const mBlob = new Blob([JSON.stringify(manifest)], { type: 'application/json' });
const mLink = document.createElement('link');
mLink.rel = 'manifest';
mLink.href = URL.createObjectURL(mBlob);
document.head.appendChild(mLink);

// ─── Init ───
loadPrefs();
loadCard();
updateDarkBtn();
</script>

</body>
</html>
